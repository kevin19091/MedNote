llm:
  provider: google
  model: gemini-2.5-pro
  temperature: 0.0
  max_tokens: 4096
  fast:
    provider: google
    model: gemini-flash-lite-latest
    max_tokens: 512

embeddings:
  model: cambridgeltl/SapBERT-from-PubMedBERT-fulltext
  batch_size: 64

reranker:
  model: cross-encoder/ms-marco-MiniLM-L6-v2

vector_store:
  local_path: data/qdrant_data
  collection_name: icd10_codes
  dense_weight: 0.7
  sparse_weight: 0.3
  top_k_retrieve: 15
  top_k_rerank: 3
  confidence_threshold: 0.7

cache:
  rag_max_size: 128

ehr_api:
  host: localhost
  port: 8100

memory:
  db_path: data/memory.db

observability:
  trace_dir: data/traces

paths:
  icd10_source_dir: data/corpus     # raw CMS.gov XML lives alongside the guidelines corpus
  icd10_tabular_path: data/corpus/icd10cm_tabular_2026.xml
  icd10_index_path: data/corpus/icd10cm_index_2026.xml
  icd10_processed_path: data/icd10_processed/icd10_codes.jsonl
  transcripts_path: data/transcripts/synthetic_transcripts.json
  ehr_store_path: data/ehr_store.json
  corpus_dir: data/corpus
  guidelines_path: data/corpus/clinical_guidelines.md

etl:
  max_index_synonyms: 10            # cap on Index phrases merged per code before embedding
  download_url: https://www.cms.gov/files/zip/2026-code-tables-tabular-and-index.zip

edge_cases:
  min_transcript_words: 10
  max_transcript_words: 5000

demo:
  latency_budget_ms: 15000
